name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências de teste
        run: pip install pytest

      - name: Rodar testes
        working-directory: api
        run: python -m pytest tests/ -v
